<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>업무 속 AI 활용 경진대회 — 발표 초안 v2</title>
<style>
:root{
  --cream:#fffaf4; --paper:#fff; --ink:#17181d; --muted:#4a4440; --subtle:#7a6f68;
  --line:#e6dccd; --line2:#d6c9b6; --brand:#0f766e; --brand-weak:#e3efec;
  --accent:#cb6d37; --warn:#c06f24; --dark:#12161c;
  --before:#8a8178; --before-bg:#f2ece3;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0e12;color:var(--ink);
  font-family:-apple-system,'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased}

/* 슬라이드: 1280x720 고정 후 뷰포트에 맞춰 스케일 */
#deck{position:fixed;inset:0;display:grid;place-items:center;padding-bottom:46px}
.slide{width:1280px;height:720px;background:var(--cream);position:relative;
  display:none;flex-direction:column;padding:56px 68px;overflow:hidden;
  transform-origin:center center}
.slide.on{display:flex}
.slide.dark{background:var(--dark);color:#f5efe7}

/* 슬라이드 머리 */
.eyebrow{display:flex;align-items:center;gap:12px;font-size:13px;font-weight:800;
  letter-spacing:.18em;color:var(--brand);margin-bottom:14px}
.eyebrow s{text-decoration:none;flex:1;height:1px;background:var(--line);display:block}
.eyebrow .rub{color:var(--subtle);letter-spacing:.04em;font-weight:700}
h1{font-size:52px;font-weight:800;letter-spacing:-.035em;line-height:1.2}
h2{font-size:38px;font-weight:800;letter-spacing:-.03em;line-height:1.25;margin-bottom:8px}
.lead{font-size:19px;color:var(--muted);font-weight:600;line-height:1.55;margin-top:10px}
.body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:20px;min-height:0}
.foot{font-size:13px;color:var(--subtle);font-weight:600;margin-top:14px}
.foot b{color:var(--brand)}

/* 공통 조각 */
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;
  letter-spacing:.03em;padding:4px 10px;border-radius:99px;border:1px solid}
.pill.est{color:#9a7b4f;border-color:#e2cfae;background:#fbf3e4}
.pill.act{color:var(--brand);border-color:#b9ded8;background:var(--brand-weak)}
.pill.exp{color:#6b5aa6;border-color:#cfc6e8;background:#f2effa}
.card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:22px 24px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* 도입 전 / 도입 후 2열 */
.ba{display:grid;grid-template-columns:1fr auto 1fr;gap:22px;align-items:stretch}
.ba .arrow{align-self:center;font-size:30px;color:var(--line2);font-weight:800}
.side{border-radius:14px;padding:22px 24px;display:flex;flex-direction:column;gap:14px}
.side.b{background:var(--before-bg);border:1px solid var(--line)}
.side.a{background:var(--paper);border:1px solid #b9ded8;box-shadow:0 2px 0 var(--brand-weak)}
.side h4{font-size:17px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
.side.b h4{color:var(--before)} .side.a h4{color:var(--brand)}
.side h4 u{text-decoration:none;width:9px;height:9px;border-radius:99px;background:currentColor}
.side ul{list-style:none;display:flex;flex-direction:column;gap:11px}
.side li{font-size:16px;line-height:1.45;font-weight:600;display:flex;gap:9px;align-items:flex-start}
.side li::before{content:'';width:5px;height:5px;border-radius:99px;background:currentColor;
  margin-top:8px;flex:none;opacity:.45}
.side.b li{color:#6f665e} .side.a li{color:var(--ink)}

/* 표 */
table{width:100%;border-collapse:collapse;font-size:15px}
th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
th{font-size:12px;letter-spacing:.08em;color:var(--subtle);font-weight:800;
  border-bottom:1px solid var(--line2)}
td b{font-weight:800}
td .num{font-weight:800;color:var(--brand);font-variant-numeric:tabular-nums}
td s{color:#a79c90}

/* 내비 */
#nav{position:fixed;left:0;right:0;bottom:0;height:46px;background:#0e1217ee;
  border-top:1px solid #1e242d;display:flex;align-items:center;gap:14px;
  padding:0 18px;color:#c9d2de;font-size:12px;z-index:9}
#nav button{background:#1b222c;color:#dbe3ee;border:1px solid #2c3542;border-radius:6px;
  padding:5px 12px;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px}
#nav .title{flex:1;color:#8a97a8;font-weight:600}
#nav .no{font-variant-numeric:tabular-nums;font-weight:800;min-width:56px;text-align:right}

@media print{
  body{background:#fff} #nav{display:none} #deck{position:static;padding:0;display:block}
  .slide{display:flex!important;transform:none!important;page-break-after:always;
    width:100%;height:100vh}
}
</style>
</head>
<body>
<div id="deck"></div>
<div id="nav">
  <button id="prev">←</button><button id="next">→</button>
  <span class="title" id="title"></span>
  <span class="no" id="no"></span>
</div>
<script>
// 슬라이드는 SLIDES 배열에 {title, html} 로 정의한다. 좌우 방향키로 넘긴다.
let cur = 0;
function render(){
  const deck = document.getElementById('deck');
  deck.innerHTML = SLIDES.map((s,i) =>
    `<section class="slide ${s.dark?'dark':''}" data-i="${i}">${s.html}</section>`).join('');
  show(cur);
}
function show(i){
  cur = Math.max(0, Math.min(SLIDES.length-1, i));
  document.querySelectorAll('.slide').forEach((el,n) => el.classList.toggle('on', n===cur));
  document.getElementById('title').textContent = SLIDES[cur].title;
  document.getElementById('no').textContent = (cur+1) + ' / ' + SLIDES.length;
  fit();
}
function fit(){
  const el = document.querySelector('.slide.on'); if(!el) return;
  el.style.transform = `scale(${Math.min(innerWidth/1280, (innerHeight-46)/720)})`;
}
addEventListener('resize', fit);
addEventListener('keydown', e => {
  if(e.key === 'ArrowRight' || e.key === 'PageDown' || e.code === 'Space'){ e.preventDefault(); show(cur+1); }
  if(e.key === 'ArrowLeft' || e.key === 'PageUp'){ e.preventDefault(); show(cur-1); }
  if(e.key === 'Home') show(0);
  if(e.key === 'End') show(SLIDES.length-1);
});
document.getElementById('prev').onclick = () => show(cur-1);
document.getElementById('next').onclick = () => show(cur+1);
</script>
<script src="slides-v2.js"></script>
</body>
</html>

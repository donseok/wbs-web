<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>업무 속 AI 활용 경진대회 — 60초 본편 / 15초 티저</title>
<style>
:root{
  --cream:#fffaf4; --ink:#17181d; --muted:#4a4440; --subtle:#7a6f68;
  --line:#e6dccd; --brand:#0f766e; --brand-weak:#e3efec; --accent:#cb6d37;
  --dark:#12161c; --dark-soft:#1a2029; --dark-line:#272d36;
  --before:#8a8178; --after:#0f766e;
  --stage-w:1920px; --stage-h:1080px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#07090c;overflow:hidden;
  font-family:-apple-system,'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased}

/* 무대: 1920x1080 고정 후 뷰포트에 맞춰 스케일 — 어떤 화면에서 녹화해도 레이아웃 동일 */
#fit{position:fixed;inset:0;display:grid;place-items:center;padding-bottom:52px;
  transition:padding-bottom .15s}
#fit.full{padding-bottom:0}
#stage{width:var(--stage-w);height:var(--stage-h);position:relative;overflow:hidden;
  background:var(--cream);transform-origin:center center}

/* ── 장면 공통 ─────────────────────────────────────────── */
.scene{position:absolute;inset:0;opacity:0;visibility:hidden;
  transition:opacity .5s ease, visibility .5s}
.scene.on{opacity:1;visibility:visible}
.cue{opacity:0;transform:translateY(14px);
  transition:opacity .55s cubic-bezier(.2,.7,.3,1), transform .55s cubic-bezier(.2,.7,.3,1)}
.cue.shown{opacity:1;transform:none}
.cue.fade{transform:none}
.cue.grow{transform:scale(.94)}
.cue.grow.shown{transform:scale(1)}

/* ── 촬영 슬롯: 실화면 녹화를 나중에 얹을 자리 ─────────── */
.slot{position:relative;background:#0d1117;border-radius:14px;overflow:hidden;
  border:2px dashed #39424f;display:flex;flex-direction:column;justify-content:center;
  align-items:center;gap:18px;padding:40px;text-align:center}
.slot::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(135deg,transparent 0 22px,rgba(255,255,255,.018) 22px 44px)}
.slot .tag{font-size:15px;letter-spacing:.16em;color:#5d6b7d;font-weight:700}
.slot .shots{list-style:none;display:flex;flex-direction:column;gap:12px;
  font-size:24px;line-height:1.5;color:#aab6c6;font-weight:600}
.slot .shots li{display:flex;gap:14px;align-items:baseline}
.slot .shots b{color:var(--brand);background:#0f766e22;border-radius:6px;
  min-width:34px;height:34px;display:grid;place-items:center;font-size:16px;flex:none}
.slot .dur{position:absolute;right:18px;bottom:14px;font-size:16px;color:#4d5a6b;
  font-variant-numeric:tabular-nums}

/* ── 자막 ──────────────────────────────────────────────── */
.caption{position:absolute;left:0;right:0;bottom:88px;text-align:center;
  font-size:44px;font-weight:800;color:var(--ink);letter-spacing:-.02em}
.caption.dark{color:#f5efe7}
.caption small{display:block;font-size:24px;font-weight:600;color:var(--subtle);
  margin-top:14px;letter-spacing:0}

/* ── 조작 UI (녹화 시 H로 숨김) ────────────────────────── */
#hud{position:fixed;left:0;right:0;bottom:0;padding:14px 22px;display:flex;
  align-items:center;gap:18px;background:#0b0e12ee;color:#c9d2de;font-size:13px;
  border-top:1px solid #1e242d;z-index:50}
#hud.hide{display:none}
#hud button{background:#1b222c;color:#dbe3ee;border:1px solid #2c3542;border-radius:7px;
  padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
#hud button:hover{background:#232c38}
#bar{flex:1;height:6px;background:#232c38;border-radius:99px;overflow:hidden}
#bar i{display:block;height:100%;width:0;background:var(--brand)}
#clock{font-variant-numeric:tabular-nums;font-weight:700;min-width:96px}
.keys{color:#6a7686}
.keys b{color:#9fb0c4;font-weight:700}

/* ── S1 밤 11시, 파일 더미 ─────────────────────────────── */
.night{background:var(--dark);height:100%;padding:96px 130px;display:flex;
  flex-direction:column;justify-content:center;gap:26px}
.night .time{position:absolute;top:64px;right:96px;font-size:30px;color:#4b5666;
  font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.04em}
.file{display:flex;align-items:center;gap:22px;font-size:38px;color:#8f9aa9;
  font-weight:600;letter-spacing:-.01em}
.file i{width:42px;height:52px;border-radius:5px;background:#232b36;flex:none;
  border:1px solid #333d4a;position:relative}
.file i::before{content:'';position:absolute;right:0;top:0;border:9px solid transparent;
  border-top-color:#12161c;border-right-color:#12161c}
.file em{font-style:normal;color:#5c6674;font-size:26px}
.file.hot{color:#c98d6a}
.file.hot i{background:#3a2a20;border-color:#5a4030}

/* ── S2 전환 문장 ──────────────────────────────────────── */
.statement{background:var(--dark);height:100%;display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:34px;text-align:center}
.statement p{font-size:58px;font-weight:700;color:#8b95a3;letter-spacing:-.025em}
.statement p.pop{font-size:72px;font-weight:800;color:#f5efe7}
.statement p.pop b{color:var(--accent);font-weight:800}

/* ── S3·S4 도입 전 / 도입 후 2열 ───────────────────────── */
.split{height:100%;background:var(--cream);display:grid;grid-template-rows:auto 1fr auto;
  padding:56px 78px 0;gap:28px}
.split .chapter{display:flex;align-items:center;gap:18px}
.split .chapter b{font-size:19px;letter-spacing:.2em;color:var(--brand);font-weight:800}
.split .chapter span{font-size:34px;font-weight:800;color:var(--ink);letter-spacing:-.02em}
.split .chapter hr{flex:1;border:0;border-top:1px solid var(--line)}
.cols{display:grid;grid-template-columns:1fr 1.32fr;gap:40px;min-height:0}
.col{display:flex;flex-direction:column;gap:18px;min-height:0}
.col .label{display:inline-flex;align-items:center;gap:10px;font-size:22px;
  font-weight:800;letter-spacing:-.01em}
.col .label u{text-decoration:none;width:11px;height:11px;border-radius:99px;background:currentColor}
.col.before .label{color:var(--before)}
.col.after  .label{color:var(--after)}
.pains{list-style:none;display:flex;flex-direction:column;gap:14px;flex:1}
.pains li{background:#f2ece3;border:1px solid var(--line);border-radius:12px;
  padding:20px 24px;font-size:26px;font-weight:600;color:#6f665e;line-height:1.4;
  display:flex;gap:14px;align-items:flex-start}
.pains li s{color:#a79c90;text-decoration-thickness:2px}
.pains li b{color:#8a7f73;font-weight:800;flex:none}
.col.after .slot{flex:1}

/* ── S5 숫자 ───────────────────────────────────────────── */
.metrics{height:100%;padding:80px 96px;display:flex;flex-direction:column;gap:44px;
  justify-content:center;background:var(--cream)}
.metrics h3{font-size:38px;font-weight:800;color:var(--ink);letter-spacing:-.025em;text-align:center}
.mrow{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
.metric{border:1px solid var(--line);border-radius:16px;padding:34px 30px;background:#fff;
  display:flex;flex-direction:column;gap:16px}
.metric .k{font-size:23px;font-weight:700;color:var(--muted);letter-spacing:-.01em}
.metric .v{display:flex;align-items:baseline;gap:14px;font-size:52px;font-weight:800;
  color:var(--ink);letter-spacing:-.03em}
.metric .v s{color:#a79c90;font-size:40px;text-decoration-thickness:3px}
.metric .v em{font-style:normal;color:var(--brand)}
.metric .v span{font-size:34px;color:#c2b6a6}
.tagline{text-align:center;font-size:24px;color:var(--subtle);font-weight:600}
.pill{display:inline-block;font-size:15px;font-weight:800;letter-spacing:.04em;
  padding:5px 11px;border-radius:99px;border:1px solid;align-self:flex-start}
.pill.est{color:#9a7b4f;border-color:#e2cfae;background:#fbf3e4}
.pill.act{color:var(--brand);border-color:#b9ded8;background:var(--brand-weak)}

/* ── S6 마무리 ─────────────────────────────────────────── */
.outro{height:100%;background:var(--dark);display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:48px;text-align:center}
.outro h2{font-size:82px;font-weight:800;color:#f5efe7;letter-spacing:-.035em;line-height:1.24}
.outro h2 b{color:#32b6ab}
.outro .pair{display:flex;align-items:center;gap:34px;color:#8b95a3;font-size:29px;font-weight:700}
.outro .pair span{color:#f5efe7}
.outro .pair i{width:1px;height:30px;background:#333d4a}
.outro .who{font-size:23px;color:#5c6674;font-weight:600;letter-spacing:.02em}

/* ── 티저 ──────────────────────────────────────────────── */
.teaser{height:100%;background:var(--dark);display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:40px;padding:0 120px;text-align:center}
.teaser .big{font-size:96px;font-weight:800;color:#f5efe7;letter-spacing:-.04em;line-height:1.15}
.teaser .big em{font-style:normal;color:#32b6ab}
.teaser .sub{font-size:34px;color:#8b95a3;font-weight:700}
</style>
</head>
<body>
<div id="fit"><div id="stage"></div></div>

<div id="hud">
  <button id="play">▶ 재생</button>
  <button id="rew">↺ 처음</button>
  <button id="mode">15초 티저</button>
  <div id="bar"><i></i></div>
  <span id="clock">0.0 / 60.0s</span>
  <span class="keys"><b>Space</b> 재생 · <b>R</b> 처음 · <b>T</b> 티저 · <b>H</b> UI숨김</span>
</div>

<script>
// ===========================================================================
// 타임라인 엔진
//   장면(scene)은 start~end 초 구간을 갖고, 장면 안의 요소는 data-at(장면 시작
//   기준 상대 초)에 맞춰 하나씩 등장한다. CSS 키프레임 대신 이 방식을 쓰는 이유는
//   초 단위 수정이 잦기 때문 — 숫자 하나만 고치면 연출 타이밍이 바뀐다.
// ===========================================================================
const stage = document.getElementById('stage');
const bar = document.querySelector('#bar i');
const clock = document.getElementById('clock');
const hud = document.getElementById('hud');

let scenes = [], total = 0, t = 0, playing = false, last = 0, mode = 'main';

function fit(){
  const s = Math.min(innerWidth / 1920, (innerHeight - (hud.classList.contains('hide') ? 0 : 52)) / 1080);
  stage.style.transform = `scale(${s})`;
}
addEventListener('resize', fit);

function build(list){
  scenes = list; total = list.reduce((m, s) => Math.max(m, s.end), 0);
  stage.innerHTML = list.map(s => `<section class="scene" data-s="${s.start}" data-e="${s.end}">${s.html}</section>`).join('');
  seek(0);
}

function seek(v){
  t = Math.max(0, Math.min(total, v));
  stage.querySelectorAll('.scene').forEach(el => {
    const s = +el.dataset.s, e = +el.dataset.e, on = t >= s && t < e;
    el.classList.toggle('on', on);
    el.querySelectorAll('.cue').forEach(c => {
      c.classList.toggle('shown', on && t - s >= (+c.dataset.at || 0));
    });
  });
  bar.style.width = (t / total * 100) + '%';
  clock.textContent = t.toFixed(1) + ' / ' + total.toFixed(1) + 's';
}

function loop(now){
  if(!playing) return;
  const dt = (now - last) / 1000; last = now;
  seek(t + dt);
  if(t >= total){ playing = false; document.getElementById('play').textContent = '▶ 재생'; return; }
  requestAnimationFrame(loop);
}
function play(){
  if(t >= total) t = 0;
  playing = !playing;
  document.getElementById('play').textContent = playing ? '❚❚ 정지' : '▶ 재생';
  if(playing){ last = performance.now(); requestAnimationFrame(loop); }
}

document.getElementById('play').onclick = play;
document.getElementById('rew').onclick = () => { playing = false; document.getElementById('play').textContent = '▶ 재생'; seek(0); };
document.getElementById('mode').onclick = () => setMode(mode === 'main' ? 'teaser' : 'main');
addEventListener('keydown', e => {
  if(e.code === 'Space'){ e.preventDefault(); play(); }
  if(e.key === 'r' || e.key === 'R'){ playing = false; seek(0); }
  if(e.key === 't' || e.key === 'T'){ setMode(mode === 'main' ? 'teaser' : 'main'); }
  if(e.key === 'h' || e.key === 'H'){
    hud.classList.toggle('hide');
    document.getElementById('fit').classList.toggle('full', hud.classList.contains('hide'));
    fit();
  }
});

//      제품명은 27초가 지나서야 처음 나온다 — 기능 소개로 시작하면 스킵된다.
//   ② 중반은 좌(도입 전) / 우(도입 후) 2열 고정. 공고의 "개선 전/후 비교 필수"를
//      영상 안에서 직접 충족시키는 형식이다.
//   ③ 우측 검은 슬롯 = 실화면 녹화를 나중에 얹을 자리. 촬영 지시가 화면에 박혀 있어
//      대본을 따로 들고 다닐 필요가 없다.
